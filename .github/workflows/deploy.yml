name: Deploy InferBedrock

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION:           ${{ vars.AWS_REGION       || 'us-east-1' }}
  BEDROCK_REGION:       ${{ vars.BEDROCK_REGION   || 'us-east-1' }}
  STACK_NAME:           ${{ vars.STACK_NAME       || 'infer-bedrock' }}
  DEPLOY_BUCKET:        ${{ vars.DEPLOY_BUCKET    || 'infer-bedrock-deploy-111526027101' }}
  ALLOWED_MODELS:       ${{ vars.ALLOWED_MODELS   || 'anthropic.claude-3-5-sonnet-20240620-v1:0' }}
  DEFAULT_MODEL:        ${{ vars.DEFAULT_MODEL    || 'anthropic.claude-3-5-sonnet-20240620-v1:0' }}
  MAX_TOKENS_LIMIT:     ${{ vars.MAX_TOKENS_LIMIT || '2000' }}
  # Accept role ARN from either Secrets or Variables
  ROLE_TO_ASSUME:       ${{ secrets.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_TO_ASSUME }}

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    environment: InferBedrock

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required secrets
        run: |
          if [ -z "${ROLE_TO_ASSUME}" ]; then
            echo "::error::AWS_ROLE_TO_ASSUME is empty. Set it under repo Settings > Secrets > Actions."
            echo "::error::Value should be: arn:aws:iam::111526027101:role/infer-bedrock-github-deploy"
            exit 1
          fi
          echo "AWS_ROLE_TO_ASSUME is set (${#ROLE_TO_ASSUME} chars)"
          if [ -z "${ADAPTER_API_KEY}" ]; then
            echo "::warning::ADAPTER_API_KEY is not set — secret in Secrets Manager will not be updated this run"
          else
            echo "ADAPTER_API_KEY is set (${#ADAPTER_API_KEY} chars) — will seed Secrets Manager after deploy"
          fi
        env:
          ADAPTER_API_KEY: ${{ secrets.ADAPTER_API_KEY }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: infer-bedrock-deploy

      - name: Package Lambda zip
        run: |
          cd src
          zip -j ../lambda.zip app.py
          cd ..
          echo "Lambda zip size: $(wc -c < lambda.zip) bytes"

      - name: Upload Lambda zip to S3
        run: |
          S3_KEY="infer-bedrock/${{ github.sha }}/lambda.zip"
          aws s3 cp lambda.zip "s3://${DEPLOY_BUCKET}/${S3_KEY}"
          echo "S3_KEY=${S3_KEY}" >> "$GITHUB_ENV"

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file infra/template.yaml \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              ProjectName=infer-bedrock \
              BedrockRegion="${BEDROCK_REGION}" \
              AllowedModels="${ALLOWED_MODELS}" \
              DefaultModel="${DEFAULT_MODEL}" \
              MaxTokensLimit="${MAX_TOKENS_LIMIT}" \
              LambdaS3Bucket="${DEPLOY_BUCKET}" \
              LambdaS3Key="${S3_KEY}" \
            --no-fail-on-empty-changeset

      - name: Seed API key in Secrets Manager
        env:
          ADAPTER_API_KEY: ${{ secrets.ADAPTER_API_KEY }}
        run: |
          if [ -z "${ADAPTER_API_KEY}" ]; then
            echo "ADAPTER_API_KEY secret not set — skipping Secrets Manager seed"
            exit 0
          fi
          SECRET_ID="infer-bedrock/adapter-api-key"
          aws secretsmanager put-secret-value \
            --secret-id "${SECRET_ID}" \
            --secret-string "${ADAPTER_API_KEY}" \
            --region "${AWS_REGION}"
          echo "API key updated in Secrets Manager (${SECRET_ID})"

      - name: Update Lambda code
        run: |
          FUNCTION_NAME=$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='FunctionName'].OutputValue" \
            --output text)
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --s3-bucket "${DEPLOY_BUCKET}" \
            --s3-key "${S3_KEY}" \
            --region "${AWS_REGION}" \
            --publish

      - name: Wait for Lambda update
        run: |
          FUNCTION_NAME=$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='FunctionName'].OutputValue" \
            --output text)
          aws lambda wait function-updated \
            --function-name "$FUNCTION_NAME" \
            --region "${AWS_REGION}"

      - name: Show stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs" \
            --output table
